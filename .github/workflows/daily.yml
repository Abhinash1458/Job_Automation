name: Daily Job Matches

# Runs every day at 6:00 AM IST (00:30 UTC), and on manual trigger.
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # commit LATEST_MATCHES.md back so it's viewable as one page

jobs:
  match:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      # Search config — broad "similar to profile" AI/ML/data keywords
      JOB_KEYWORDS: "AI Engineer, GenAI, Generative AI, Machine Learning, ML Engineer, LLM, Agentic AI, Applied Scientist, Applied AI, Data Scientist, NLP, MLOps, Deep Learning, AI/ML, Python Developer"
      JOB_LOCATION: "Bangalore, Hyderabad"
      JOB_REMOTE: "false"
      MATCH_THRESHOLD: "70"
      MAX_JOBS_PER_RUN: "100"
      TAILOR_TOP: "0"
      FULL_NAME: "Neelapalli Abhinash"
      EMAIL: "neelapalliabhinash1458@gmail.com"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      # Recreate the resume profile from a secret (kept out of the public repo)
      - name: Restore resume profile
        env:
          PROFILE_JSON: ${{ secrets.PROFILE_JSON }}
        run: |
          mkdir -p data
          printf '%s' "$PROFILE_JSON" > data/profile.json
          python -c "import json; json.load(open('data/profile.json')); print('profile.json OK')"

      - name: Run daily pipeline
        run: python -m src.main daily --fresh

      # Publish the matches page back to the repo (one clickable link to view).
      - name: Publish LATEST_MATCHES.md
        run: |
          git config user.name "job-hunt-bot"
          git config user.email "actions@github.com"
          git add -f LATEST_MATCHES.md data/seen_jobs.json matches/
          git commit -m "Job matches $(date -u +'%Y-%m-%d %H:%M') UTC" || echo "no changes"
          git push || echo "nothing to push"

      # Also keep a downloadable copy (HTML + Markdown) for each run.
      - name: Upload matches artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-matches-${{ github.run_number }}
          path: |
            data/reports/*.md
            data/reports/*.html
            LATEST_MATCHES.md
          if-no-files-found: warn
          retention-days: 30
