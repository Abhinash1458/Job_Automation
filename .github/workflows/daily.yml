name: Daily Job Matches

# Runs every day at 6:00 AM IST (00:30 UTC), and on manual trigger.
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  match:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      # Search config
      JOB_KEYWORDS: "AI Engineer, GenAI Engineer, Machine Learning Engineer, LLM Engineer, Agentic AI, Python Developer"
      JOB_LOCATION: "Bangalore, Hyderabad"
      JOB_REMOTE: "false"
      MATCH_THRESHOLD: "75"
      MAX_JOBS_PER_RUN: "100"
      FULL_NAME: "Neelapalli Abhinash"
      EMAIL: "neelapalliabhinash1458@gmail.com"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      # Recreate the resume profile from a secret (kept out of the public repo)
      - name: Restore resume profile
        env:
          PROFILE_JSON: ${{ secrets.PROFILE_JSON }}
        run: |
          mkdir -p data
          printf '%s' "$PROFILE_JSON" > data/profile.json
          python -c "import json; json.load(open('data/profile.json')); print('profile.json OK')"

      - name: Run daily pipeline
        run: python -m src.main daily --fresh

      # Deliver results as a downloadable artifact (not committed to the repo).
      - name: Upload matches
        uses: actions/upload-artifact@v4
        with:
          name: job-matches-${{ github.run_number }}
          path: |
            data/reports/*.md
            data/reports/*.html
            LATEST_MATCHES.md
          if-no-files-found: warn
          retention-days: 30
